[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --no-input"

[deploy]
startCommand = "python manage.py migrate && python manage.py shell -c \"from django.contrib.auth import get_user_model; U = get_user_model(); U.objects.filter(username='admin').exists() or U.objects.create_superuser('admin', 'admin@fucinasalentina.it', 'changeme123')\" && gunicorn fucinapp.wsgi:application --bind 0.0.0.0:$PORT"
restartPolicyType = "ON_FAILURE"
