[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --no-input"

[deploy]
startCommand = "python manage.py migrate && python manage.py shell -c \"import os; from django.contrib.auth import get_user_model; U = get_user_model(); U.objects.filter(username=os.environ['DJANGO_SUPERUSER_USERNAME']).exists() or U.objects.create_superuser(os.environ['DJANGO_SUPERUSER_USERNAME'], os.environ['DJANGO_SUPERUSER_EMAIL'], os.environ['DJANGO_SUPERUSER_PASSWORD'])\" && GUNICORN_RUNNING=1 gunicorn registro_soci.wsgi:application --bind 0.0.0.0:$PORT --workers 1"
restartPolicyType = "ON_FAILURE"
