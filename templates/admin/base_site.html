{% extends "admin/base.html" %}

{% block site_header %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">Fucinapp</a></h1>
{% endblock %}

{% block title %}{{ title }} | Fucinapp{% endblock %}

{% block extrahead %}
{{ block.super }}
<script>
    document.addEventListener("DOMContentLoaded", function () {
    const sidebar = document.getElementById("nav-sidebar");
    if (!sidebar) return;

    // Hide the auto-generated Reports app section from Django
    sidebar.querySelectorAll(".module").forEach(function(mod) {
        var link = mod.querySelector("caption a");
        if (link && link.textContent.trim() === "Reports" && !mod.dataset.custom) {
            mod.style.display = "none";
        }
    });

    const stats = document.createElement("div");
    stats.className = "module";
    stats.innerHTML = `
        <table>
            <caption>
                <a href="/anagrafica/dashboard/" class="section" title="Dashboard">
                    📊 Stats
                </a>
            </caption>
            <tr>
                <th scope="row">
                    <a href="/anagrafica/dashboard/">Scadenze</a>
                </th>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <th scope="row">
                    <a href="/anagrafica/budget/">Budget</a>
                </th>
                <td></td>
                <td></td>
            </tr>
        </table>
    `;
    sidebar.appendChild(stats);

    const reports = document.createElement("div");
    reports.className = "module";
    reports.dataset.custom = "true";
    reports.innerHTML = `
        <table>
            <caption>
                <a href="/admin/reports/verbale/" class="section" title="Reports">
                    Reports
                </a>
            </caption>
            <tr>
                <th scope="row">
                    <a href="/admin/reports/verbale/">Verbali</a>
                </th>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <th scope="row">
                    <a href="/admin/anagrafica/socio/registro-soci-pdf/">Registro soci PDF</a>
                </th>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <th scope="row">
                    <a href="/admin/anagrafica/socio/moduli-iscrizione-pdf/">Moduli iscrizione PDF</a>
                </th>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <th scope="row">
                    <a href="/admin/reports/newsletter/">Newsletter</a>
                </th>
                <td></td>
                <td></td>
            </tr>
        </table>
    `;
    sidebar.appendChild(reports);
});
</script>
{% endblock %}
